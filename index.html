<!doctype html>
<html lang="fa" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Farhad Dezhmifard — Portfolio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;700;900&family=JetBrains+Mono:wght@400;600&family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      /* ── TOKENS ── */
      :root {
        --bg: #0d1117;
        --surface: #161b22;
        --surface2: #1c2333;
        --border: #30363d;
        --gold: #e6a817;
        --gold-dim: #9a6f10;
        --text: #e6edf3;
        --muted: #8b949e;
        --faint: #3d444d;
        --green: #3fb950;
        --mono: "JetBrains Mono", monospace;
        --sans-fa: "Vazirmatn", sans-serif;
        --sans-en: "Inter", sans-serif;
        --radius: 12px;
        --radius-sm: 6px;
      }

      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html {
        scroll-behavior: smooth;
      }

      body {
        background: var(--bg);
        color: var(--text);
        font-family: var(--sans-fa);
        font-size: 15px;
        line-height: 1.75;
        min-height: 100vh;
      }
      body.en {
        font-family: var(--sans-en);
      }

      /* ── LAYOUT ── */
      .shell {
        max-width: 860px;
        margin: 0 auto;
        padding: 32px 20px 80px;
      }

      /* ── TOOLBAR (LANG + PDF) ── */
      .toolbar {
        position: fixed;
        top: 20px;
        left: 20px;
        z-index: 100;
        display: flex;
        gap: 10px;
      }
      [dir="ltr"] .toolbar {
        left: auto;
        right: 20px;
      }

      .lang-btn,
      .pdf-btn {
        display: flex;
        align-items: center;
        gap: 6px;
        background: var(--surface2);
        border: 1px solid var(--border);
        font-family: var(--mono);
        font-size: 0.78rem;
        font-weight: 600;
        padding: 7px 14px;
        border-radius: 99px;
        cursor: pointer;
        transition:
          background 0.2s,
          border-color 0.2s,
          transform 0.15s;
        letter-spacing: 0.03em;
      }
      .lang-btn {
        color: var(--gold);
      }
      .lang-btn:hover {
        background: var(--border);
        border-color: var(--gold-dim);
        transform: scale(1.04);
      }
      .lang-btn .dot {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: var(--green);
        display: inline-block;
      }

      .pdf-btn {
        color: var(--text);
      }
      .pdf-btn:hover {
        background: var(--border);
        border-color: var(--gold-dim);
        transform: scale(1.04);
        color: var(--gold);
      }

      /* ── HEADER ── */
      .hero {
        padding: 60px 0 48px;
        border-bottom: 1px solid var(--border);
        margin-bottom: 48px;
      }
      .hero-eyebrow {
        font-family: var(--mono);
        font-size: 0.78rem;
        color: var(--gold);
        letter-spacing: 0.12em;
        text-transform: uppercase;
        margin-bottom: 14px;
        opacity: 0;
        animation: fadeUp 0.5s 0.1s forwards;
      }
      .hero-name {
        font-size: clamp(2.4rem, 6vw, 3.8rem);
        font-weight: 900;
        line-height: 1.1;
        letter-spacing: -0.02em;
        color: var(--text);
        opacity: 0;
        animation: fadeUp 0.5s 0.2s forwards;
      }
      .hero-name span {
        color: var(--gold);
      }
      .hero-title {
        font-size: 1.05rem;
        font-weight: 400;
        color: var(--muted);
        margin-top: 10px;
        opacity: 0;
        animation: fadeUp 0.5s 0.3s forwards;
      }
      .hero-contact {
        display: flex;
        flex-wrap: wrap;
        gap: 10px 20px;
        margin-top: 28px;
        opacity: 0;
        animation: fadeUp 0.5s 0.4s forwards;
      }
      .contact-chip {
        display: flex;
        align-items: center;
        gap: 7px;
        font-family: var(--mono);
        font-size: 0.8rem;
        color: var(--muted);
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius-sm);
        padding: 5px 12px;
        transition:
          color 0.2s,
          border-color 0.2s;
      }
      .contact-chip a {
        color: inherit;
        text-decoration: none;
      }
      .contact-chip:hover {
        color: var(--gold);
        border-color: var(--gold-dim);
      }
      .contact-chip .icon {
        font-size: 0.9rem;
      }

      /* ── SECTION ── */
      .section {
        margin-bottom: 52px;
        opacity: 0;
        animation: fadeUp 0.5s forwards;
      }
      .section:nth-of-type(1) {
        animation-delay: 0.45s;
      }
      .section:nth-of-type(2) {
        animation-delay: 0.55s;
      }
      .section:nth-of-type(3) {
        animation-delay: 0.65s;
      }
      .section:nth-of-type(4) {
        animation-delay: 0.75s;
      }

      .section-header {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 24px;
      }
      .section-label {
        font-family: var(--mono);
        font-size: 0.7rem;
        font-weight: 600;
        color: var(--gold);
        letter-spacing: 0.14em;
        text-transform: uppercase;
        background: rgba(230, 168, 23, 0.08);
        border: 1px solid var(--gold-dim);
        border-radius: 4px;
        padding: 2px 8px;
        white-space: nowrap;
      }
      .section-line {
        flex: 1;
        height: 1px;
        background: var(--border);
      }

      /* ── SUMMARY ── */
      .summary-card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 24px 28px;
        color: var(--muted);
        line-height: 1.9;
        position: relative;
        overflow: hidden;
      }
      .summary-card::before {
        content: "";
        position: absolute;
        inset-inline-start: 0;
        top: 0;
        bottom: 0;
        width: 3px;
        background: linear-gradient(to bottom, var(--gold), transparent);
        border-radius: 2px;
      }
      [dir="ltr"] .summary-card::before {
        left: 0;
        right: auto;
      }
      [dir="rtl"] .summary-card::before {
        right: 0;
        left: auto;
      }

      /* ── EXPERIENCE / EDUCATION ── */
      .timeline {
        display: flex;
        flex-direction: column;
        gap: 24px;
      }
      .timeline-item {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 22px 26px;
        position: relative;
        transition:
          border-color 0.2s,
          box-shadow 0.2s;
      }
      .timeline-item:hover {
        border-color: var(--gold-dim);
        box-shadow:
          0 0 0 1px var(--gold-dim),
          0 8px 32px rgba(0, 0, 0, 0.3);
      }
      .item-top {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        flex-wrap: wrap;
        gap: 8px;
        margin-bottom: 6px;
      }
      .item-role {
        font-size: 1.05rem;
        font-weight: 700;
        color: var(--text);
      }
      .item-period {
        font-family: var(--mono);
        font-size: 0.75rem;
        color: var(--gold);
        background: rgba(230, 168, 23, 0.08);
        border: 1px solid var(--gold-dim);
        border-radius: 99px;
        padding: 3px 12px;
        white-space: nowrap;
      }
      .item-sub {
        font-size: 0.88rem;
        color: var(--muted);
        margin-bottom: 14px;
      }
      .item-bullets {
        list-style: none;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      .item-bullets li {
        display: flex;
        gap: 10px;
        color: var(--muted);
        font-size: 0.92rem;
        line-height: 1.7;
      }
      .item-bullets li::before {
        content: "▸";
        color: var(--gold);
        flex-shrink: 0;
        margin-top: 2px;
      }

      /* ── PROJECTS ── */
      .projects-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 16px;
      }
      .project-card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 22px 24px;
        display: flex;
        flex-direction: column;
        gap: 10px;
        transition:
          border-color 0.2s,
          box-shadow 0.2s;
      }
      .project-card:hover {
        border-color: var(--gold-dim);
        box-shadow:
          0 0 0 1px var(--gold-dim),
          0 8px 32px rgba(0, 0, 0, 0.3);
      }
      .project-name {
        font-size: 1rem;
        font-weight: 700;
        color: var(--text);
      }
      .project-desc {
        font-size: 0.88rem;
        color: var(--muted);
        line-height: 1.7;
        flex: 1;
      }
      .project-stack {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
      }
      .project-links {
        display: flex;
        gap: 10px;
        margin-top: 4px;
      }
      .project-link {
        font-family: var(--mono);
        font-size: 0.75rem;
        color: var(--gold);
        text-decoration: none;
        border: 1px solid var(--gold-dim);
        border-radius: 99px;
        padding: 2px 12px;
        transition: background 0.2s;
      }
      .project-link:hover {
        background: rgba(230, 168, 23, 0.1);
      }
      @media (max-width: 600px) {
        .projects-grid {
          grid-template-columns: 1fr;
        }
      }

      /* ── SKILLS ── */
      .skills-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 16px;
      }
      .skill-card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 18px 20px;
        transition: border-color 0.2s;
      }
      .skill-card:hover {
        border-color: var(--gold-dim);
      }
      .skill-card.wide {
        grid-column: 1 / -1;
      }
      .skill-card-title {
        font-family: var(--mono);
        font-size: 0.72rem;
        font-weight: 600;
        color: var(--gold);
        letter-spacing: 0.1em;
        text-transform: uppercase;
        margin-bottom: 12px;
      }
      .tags {
        display: flex;
        flex-wrap: wrap;
        gap: 7px;
      }
      .tag {
        font-family: var(--mono);
        font-size: 0.78rem;
        background: var(--surface2);
        color: var(--text);
        border: 1px solid var(--faint);
        border-radius: var(--radius-sm);
        padding: 3px 10px;
        transition:
          background 0.2s,
          border-color 0.2s,
          color 0.2s;
        cursor: default;
      }
      .tag:hover {
        background: rgba(230, 168, 23, 0.1);
        border-color: var(--gold-dim);
        color: var(--gold);
      }

      /* ── FOOTER ── */
      .footer {
        text-align: center;
        font-family: var(--mono);
        font-size: 0.75rem;
        color: var(--faint);
        padding-top: 32px;
        border-top: 1px solid var(--border);
      }

      /* ── ANIMATIONS ── */
      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: translateY(16px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      /* ── RESPONSIVE ── */
      @media (max-width: 600px) {
        .skills-grid {
          grid-template-columns: 1fr;
        }
        .skill-card.wide {
          grid-column: 1;
        }
        .hero-name {
          font-size: 2.2rem;
        }
        .item-top {
          flex-direction: column;
        }
      }

      /* ── PRINT ── */
      @media print {
        body {
          background: #fff;
          color: #000;
        }
        .toolbar {
          display: none;
        }
        .shell {
          padding: 0;
        }
        .timeline-item,
        .summary-card,
        .skill-card {
          background: #f9f9f9;
          border-color: #ddd;
          box-shadow: none;
        }
        .hero-eyebrow,
        .section-label {
          color: #c8860e;
        }
        .hero-name span {
          color: #c8860e;
        }
        .item-period {
          color: #c8860e;
          background: #fff8e7;
          border-color: #c8860e;
        }
      }
    </style>
  </head>
  <body>
    <!-- Toolbar: Language + PDF export -->
    <div class="toolbar">
      <button class="lang-btn" onclick="toggleLang()" id="langBtn">
        <span class="dot"></span>
        <span id="langLabel">English</span>
      </button>
      <button class="pdf-btn" onclick="exportPDF()" id="pdfBtn">
        <span>📄</span>
        <span id="pdfLabel">PDF</span>
      </button>
    </div>

    <div class="shell">
      <!-- HERO -->
      <header class="hero" id="hero">
        <div class="hero-eyebrow" id="eyebrow"></div>
        <h1 class="hero-name" id="heroName"></h1>
        <p class="hero-title" id="heroTitle"></p>
        <div class="hero-contact" id="heroContact"></div>
      </header>

      <!-- SUMMARY -->
      <section class="section" id="sectionSummary">
        <div class="section-header">
          <span class="section-label" id="labelSummary"></span>
          <div class="section-line"></div>
        </div>
        <div class="summary-card">
          <p id="summaryText"></p>
        </div>
      </section>

      <!-- EXPERIENCE -->
      <section class="section" id="sectionExperience">
        <div class="section-header">
          <span class="section-label" id="labelExperience"></span>
          <div class="section-line"></div>
        </div>
        <div class="timeline" id="experienceList"></div>
      </section>

      <!-- PROJECTS -->
      <section class="section" id="sectionProjects">
        <div class="section-header">
          <span class="section-label" id="labelProjects"></span>
          <div class="section-line"></div>
        </div>
        <div class="projects-grid" id="projectsList"></div>
      </section>

      <!-- EDUCATION -->
      <section class="section" id="sectionEducation">
        <div class="section-header">
          <span class="section-label" id="labelEducation"></span>
          <div class="section-line"></div>
        </div>
        <div class="timeline" id="educationList"></div>
      </section>

      <!-- SKILLS -->
      <section class="section" id="sectionSkills">
        <div class="section-header">
          <span class="section-label" id="labelSkills"></span>
          <div class="section-line"></div>
        </div>
        <div class="skills-grid" id="skillsGrid"></div>
      </section>

      <footer class="footer" id="footerText"></footer>
    </div>

    <script>
      // ── Load data.json then render ──
      let DATA = null;
      let currentLang = "fa";

      async function loadData() {
        try {
          const res = await fetch("data.json");
          DATA = await res.json();
        } catch (e) {
          // Fallback inline data if fetch fails (e.g. file:// protocol)
          DATA = FALLBACK_DATA;
        }
        render(currentLang);
      }

      function render(lang) {
        const d = DATA[lang];
        currentLang = lang;

        // html dir + lang
        document.documentElement.lang = d.lang;
        document.documentElement.dir = d.dir;
        document.body.classList.toggle("en", lang === "en");

        // Lang button
        document.getElementById("langLabel").textContent = d.toggleLabel;

        // PDF button label
        document.getElementById("pdfLabel").textContent =
          lang === "fa" ? "دانلود PDF" : "Download PDF";

        // Hero
        document.getElementById("eyebrow").textContent =
          lang === "fa" ? "< مهندس نرم‌افزار />" : "< software engineer />";
        document.getElementById("heroName").innerHTML =
          lang === "fa"
            ? "فرهاد <span>دژمی‌فرد</span>"
            : "Farhad <span>Dezhmifard</span>";
        document.getElementById("heroTitle").textContent = d.title;

        // Contact chips
        const contact = d.contact;
        const chips = [
          { icon: "📍", text: contact.location },
          { icon: "✉️", text: contact.email, href: `mailto:${contact.email}` },
          ...contact.phones.map((p) => ({ icon: "📞", text: p })),
        ];
        document.getElementById("heroContact").innerHTML = chips
          .map(
            (c) =>
              `<div class="contact-chip">
          <span class="icon">${c.icon}</span>
          ${c.href ? `<a href="${c.href}">${c.text}</a>` : `<span>${c.text}</span>`}
        </div>`,
          )
          .join("");

        // Sections labels
        document.getElementById("labelSummary").textContent =
          d.sections.summary;
        document.getElementById("labelExperience").textContent =
          d.sections.experience;
        document.getElementById("labelEducation").textContent =
          d.sections.education;
        document.getElementById("labelSkills").textContent = d.sections.skills;

        // Summary
        document.getElementById("summaryText").textContent = d.summary;

        // Experience
        document.getElementById("experienceList").innerHTML = d.experience
          .map(
            (job) => `
        <div class="timeline-item">
          <div class="item-top">
            <span class="item-role">${job.role}</span>
            <span class="item-period">${job.period}${job.periodEn ? " · " + job.periodEn : ""}</span>
          </div>
          <div class="item-sub">${job.company}${job.location ? " — " + job.location : ""}</div>
          <ul class="item-bullets">
            ${job.bullets.map((b) => `<li>${b}</li>`).join("")}
          </ul>
        </div>
      `,
          )
          .join("");

        // Projects
        document.getElementById("labelProjects").textContent =
          d.sections.projects;

        document.getElementById("projectsList").innerHTML = (d.projects || [])
          .map(
            (p) => `
  <div class="project-card">
    <div class="project-name">${p.name}</div>
    <div class="project-desc">${p.description}</div>
    <div class="project-stack">
      ${p.stack.map((t) => `<span class="tag">${t}</span>`).join("")}
    </div>
    <div class="project-links">
      ${p.links.map((l) => `<a class="project-link" href="${l.url}" target="_blank">${l.label} ↗</a>`).join("")}
    </div>
  </div>
`,
          )
          .join("");

        // Education
        document.getElementById("educationList").innerHTML = d.education
          .map(
            (edu) => `
        <div class="timeline-item">
          <div class="item-top">
            <span class="item-role">${edu.degree}</span>
            <span class="item-period">${edu.period}${edu.periodEn ? " · " + edu.periodEn : ""}</span>
          </div>
          <div class="item-sub">${edu.institution}</div>
        </div>
      `,
          )
          .join("");

        // Skills
        const skillEntries = Object.entries(d.skills);
        document.getElementById("skillsGrid").innerHTML = skillEntries
          .map(([cat, tags], i) => {
            const isLast = i === skillEntries.length - 1;
            const isOdd = skillEntries.length % 2 !== 0;
            const wide = isLast && isOdd ? "wide" : "";
            return `
          <div class="skill-card ${wide}">
            <div class="skill-card-title">${cat}</div>
            <div class="tags">${tags.map((t) => `<span class="tag">${t}</span>`).join("")}</div>
          </div>
        `;
          })
          .join("");

        // Footer
        document.getElementById("footerText").textContent =
          lang === "fa"
            ? `© ${new Date().getFullYear()} فرهاد دژمی‌فرد — ساخته‌شده با HTML + CSS + JS`
            : `© ${new Date().getFullYear()} Farhad Dezhmifard — Built with HTML + CSS + JS`;
      }

      function toggleLang() {
        render(currentLang === "fa" ? "en" : "fa");
      }

      function exportPDF() {
        window.print();
      }

      // ── Fallback data (mirrors data.json, used when fetch is unavailable) ──
      const FALLBACK_DATA = {
        fa: {
          lang: "fa",
          dir: "rtl",
          name: "فرهاد دژمی‌فرد",
          title: "مهندس نرم‌افزار — متخصص Node.js",
          toggleLabel: "English",
          contact: {
            location: "تهران، امیریه",
            email: "Farddezh@gmail.com",
            phones: ["۰۹۹۰۹۰۱۱۴۹۱", "۰۹۰۱۶۶۰۰۵۳۸"],
          },
          summary:
            "توسعه‌دهنده خودآموخته بک‌اند با تجربه کار بر روی سیستم‌های واقعی. مسلط به Node.js، Python و اکوسیستم پایگاه‌های داده مختلف. همیشه در حال یادگیری — و همیشه آماده چالش بعدی. برخلاف تجربه کاری در زمینه .NET، مایل به اشتغال و کارآموزی به عنوان برنامه‌نویس بک‌اند در Node.JS، Python و یا Go هستم.",
          sections: {
            summary: "خلاصه توانمندی‌های حرفه‌ای",
            experience: "سوابق شغلی",
            education: "تحصیلات",
            skills: "مهارت‌ها و فناوری‌ها",
          },
          experience: [
            {
              role: "توسعه‌دهنده Back-End",
              company: "ViraProcess",
              location: "تهران",
              period: "تیر ۱۴۰۰ تا خرداد ۱۴۰۱",
              periodEn: "July 2021 – June 2022",
              bullets: [
                "توسعه و نگهداری نرم‌افزار فروشگاهی ساخته‌شده با فریم‌ورک ASP.NET.",
                "پیاده‌سازی راه‌حل‌های خودکار وب اسکرپینگ برای جمع‌آوری داده‌های ضروری با استفاده از Python، Node.js و Selenium.",
                "همکاری در بخش فرانت‌اند برای طراحی و پیاده‌سازی نیازمندی‌ها با استفاده از Bootstrap.",
              ],
            },
          ],
          education: [
            {
              degree: "کارشناسی: مهندسی کامپیوتر (گرایش نرم‌افزار)",
